<!DOCTYPE html>
<html lang="en">
<head>
    <script>
    // 🛡️ Unauthorized Bypass Protection Guard
    if(localStorage.getItem("sultan_session") !== "authenticated_secure_2026") {
        window.location.href = "admin.html";
    }
</script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sultan Brand | Admin Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; }
        .dashboard-container { max-width: 600px; background: #ffffff; padding: 30px; margin: 20px auto; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { text-align: center; color: #111; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 1px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #333; }
        input[type="text"], input[type="number"], select, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 14px; }
        textarea { height: 100px; resize: vertical; }
        .btn-publish { width: 100%; padding: 14px; background: #111111; color: #fff; border: none; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.3s; text-transform: uppercase; }
        .btn-publish:hover { background: #333333; }
        .btn-delete { width: auto; padding: 8px 16px; background: #d9534f; color: white; border: none; border-radius: 4px; font-size: 13px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .btn-delete:hover { background: #c9302c; }
    </style>

</head>
<body>
<!-- 🚪 Top-Right Box with "Logout" Written Clearly -->
<div style="position: fixed; top: 20px; right: 20px; z-index: 99999;">
    <button onclick="logoutEngine()" style="background-color: #d9534f; color: white; border: 1px solid #b52b27; padding: 8px 15px; font-size: 13px; font-family: 'Montserrat', Arial, sans-serif; font-weight: bold; border-radius: 4px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.15); transition: 0.2s;">
        Logout
    </button>
</div>

<!-- 1. ONLINE PRODUCT ADD + EDIT FORM -->
<div class="dashboard-container">
    <h2 id="formDynamicHeading">Add New Luxury Product</h2>
    <form id="productForm">
        <div class="form-group">
            <label>Product Title</label>
            <input type="text" id="title" placeholder="e.g., Luxury Unstitched Lawn - 3pc" required>
        </div>

        <div class="form-group">
            <label>Main Category</label>
            <select id="category" onchange="handleCategoryChange()" required>
                <option value="">Choose Main Category</option>
                <option value="NewArrivals">New Arrivals</option>
                <option value="Unstitched">Unstitched</option>
                <option value="ReadyToWear">Ready to Wear</option>
                <option value="Men">Men</option>
                <option value="Sale">Sale</option>
            </select>
        </div>

        <!-- DYNAMIC SUB-CATEGORY LAYER -->
        <div class="form-group" id="subCategoryWrapper" style="display: none;">
            <label id="subCategoryLabel">Sub-Category (Dropdown Filter)</label>
            <select id="subCategory">
                <!-- Options JavaScript ke zariye load honge -->
            </select>
        </div>

        <div class="form-group">
            <label>Price (PKR)</label>
            <input type="number" id="price" placeholder="e.g., 8500" required>
        </div>

        <div class="form-group">
            <label>Sale Price (Optional)</label>
            <input type="number" id="salePrice" placeholder="e.g., 6500" value="0">
        </div>

        <div class="form-group">
            <label>Product Image URL</label>
            <input type="text" id="imageUrl" placeholder="Paste image link here" required>
        </div>

        <div class="form-group">
            <label>Description / Fabric Details</label>
            <textarea id="description" placeholder="Premium Cloth Details..."></textarea>
        </div>

        <button type="submit" class="btn-publish">🚀 Publish Product Online</button>
        
    </form>
</div>
<!-- 2. ONLINE BANNER SLIDER ADD + EDIT FORM -->
<div class="dashboard-container">
    <h2 id="bannerDynamicHeading">Add Main Page Banner</h2>
    <form id="bannerForm">
        <div class="form-group">
            <label>Banner Subtitle</label>
            <input type="text" id="bannerSubtitle" placeholder="e.g., Luxury Festive Launch" required>
        </div>
        <div class="form-group">
            <label>Banner Main Title</label>
            <input type="text" id="bannerTitle" placeholder="e.g., Flat 50% Off Selected Items" required>
        </div>
        <div class="form-group">
            <label>Banner Background Image URL</label>
            <input type="text" id="bannerImgUrl" placeholder="Paste your premium banner image link here" required>
        </div>
        <button type="submit" class="btn-publish">🚀 Publish Banner Live</button>
    </form>
</div>

<!-- 3. ONLINE BANNER SLIDERS MANAGEMENT LIST -->
<div class="dashboard-container" style="max-width: 800px;">
    <h2>Manage Main Page Banners</h2>
    <div id="admin-banner-list" style="margin-top: 20px;">Loading banners...</div>
</div>

<!-- 4. ONLINE PRODUCT DELETE + EDIT LIST -->
<div class="dashboard-container" style="max-width: 800px;">
    <h2>Manage Online Products</h2>
    <div id="admin-product-list" style="margin-top: 20px;">Loading products...</div>
</div>

<script>
    let currentEditProductId = null; // Memory tracker for active product editing mode
    let currentEditBannerId = null;    // Memory tracker for active banner editing mode

    // ⚡ 1. GLOBAL ACCOUNTS CONFIGURATION VALUES
    const accountsData = {
        easypaisa: { title: "M. Moazzam", number: "03003521238" },
        jazzcash: { title: "M. Moazzam", number: "03003521238" },
        bank: { title: "Sultan Brand Private Ltd", number: "HBL - 1234567890123" }
    };

    // ✅ 2. DYNAMIC DROPDOWN LAYER VIEW CONTROLLER
    function handleCategoryChange() {
        const mainCategory = document.getElementById('category').value;
        const wrapper = document.getElementById('subCategoryWrapper');
        const subSelect = document.getElementById('subCategory');
        
        if (!mainCategory) {
            if(wrapper) wrapper.style.display = 'none';
            if(subSelect) subSelect.innerHTML = '';
            return;
        }

        let optionsHtml = '';

        if (mainCategory === 'Unstitched') {
            if(wrapper) wrapper.style.display = 'block';
            optionsHtml = `
                <option value="1 Piece">1 PIECE KURTA FABRIC</option>
                <option value="2 Piece">2 PIECE SUIT</option>
                <option value="3 Piece">3 PIECE LUXURY LAWN</option>
                <option value="Egyptian Cotton">EGYPTIAN COTTON</option>
            `;
        } 
        else if (mainCategory === 'Men') {
            if(wrapper) wrapper.style.display = 'block';
            optionsHtml = `
                <option value="Royal Sherwani">ROYAL SHERWANI</option>
                <option value="Premium Kurtas">PREMIUM KURTAS</option>
                <option value="Kurta Shalwar Suits">KURTA SHALWAR SUITS</option>
                <option value="Cotton Suits Stitched">COTTON SUITS (STITCHED)</option>
                <option value="Luxury Latha Stitched">LUXURY LATHA (STITCHED)</option>
                <option value="Premium Cotton Unstitched">PREMIUM COTTON (UNSTITCHED)</option>
                <option value="Luxury Latha Unstitched">LUXURY LATHA (UNSTITCHED)</option>
                <option value="Wash Wear Fabric">WASH & WEAR FABRIC</option>
            `;
        }
        else if (mainCategory === 'NewArrivals') {
            if(wrapper) wrapper.style.display = 'block';
            optionsHtml = `
                <option value="Festive">LUXURY FESTIVE '26</option>
                <option value="Summer">SUMMER LAWN VOLUME II</option>
                <option value="Cambric">PREMIUM CAMBRIC</option>
            `;
        }
        else if (mainCategory === 'ReadyToWear') {
            if(wrapper) wrapper.style.display = 'block';
            optionsHtml = `
                <option value="Casual">CASUAL KURTAS</option>
                <option value="Stitched">STITCHED SUITS</option>
                <option value="Tailored">TAILORED / CUSTOM FIT</option>
                <option value="Waistcoat">DESIGNER WAISTCOATS</option>
            `;
        }
        else if (mainCategory === 'Sale') {
            if(wrapper) wrapper.style.display = 'block';
            // 🎯 FIXED ALL EXPLICIT SPLIT PERCENTAGE ENTRIES INJECTED STEP-BY-STEP FOR PROPER MAPPING
            optionsHtml = `
                <option value="Flat 50">FLAT 50% OFF (Stitched)</option>
                <option value="Flat 40">FLAT 40% OFF (Stitched)</option>
                <option value="Flat 30">FLAT 30% OFF (Stitched)</option>
                <option value="Flat 20">FLAT 20% OFF (Stitched)</option>
                <option value="UnstitchedFlat50">✂️ UNSTITCHED 50% OFF</option>
                <option value="UnstitchedFlat40">✂️ UNSTITCHED 40% OFF</option>
                <option value="UnstitchedFlat30">✂️ UNSTITCHED 30% OFF</option>
                <option value="UnstitchedFlat20">✂️ UNSTITCHED 20% OFF</option>
                <option value="Clearance">CLEARANCE SALE</option>
            `;
        }
        else {
            if(wrapper) wrapper.style.display = 'none';
            if(subSelect) subSelect.innerHTML = '';
            return;
        }

        if(subSelect) subSelect.innerHTML = optionsHtml;
    }
    // ✅ 3. PRODUCT ADD + EDIT UPDATE UNIFIED MULTI-MODE ENGINE
    document.getElementById('productForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const price = Number(document.getElementById('price').value);
        const salePrice = Number(document.getElementById('salePrice').value);
        const mainCat = document.getElementById('category').value;
        const subCat = document.getElementById('subCategory') ? document.getElementById('subCategory').value : '';
        
        const productData = {
            title: document.getElementById('title').value,
            category: mainCat,
            subCategory: subCat, 
            price: price,
            salePrice: salePrice,
            isSale: (salePrice > 0 || mainCat === 'Sale') ? true : false,
            images: document.getElementById('imageUrl').value, 
            description: document.getElementById('description').value
        };

        let apiUrl = 'https://sultan-backend.vercel.app/api/products/add';
        let httpMethod = 'POST';

        if (currentEditProductId) {
            apiUrl = `https://sultan-backend.vercel.app/api/products/update/${currentEditProductId}`;
            httpMethod = 'PUT';
        }

        try {
            const response = await fetch(apiUrl, {
                method: httpMethod,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(productData)
            });

            const result = await response.json();

            if (result.success || response.status === 200 || response.status === 201) {
                alert(currentEditProductId ? '🎉 Status: Product variations updated live!' : '🎉 Status: Product uploaded successfully!');
                
                document.getElementById('productForm').reset();
                currentEditProductId = null;
                document.getElementById('formDynamicHeading').innerText = "Add New Luxury Product";
                document.querySelector('#productForm .btn-publish').innerText = "🚀 Publish Product Online";

                handleCategoryChange(); 
                fetchAdminProducts(); 
            } else {
                alert('❌ Operation Failed: ' + (result.error || 'Unknown server database error'));
            }
        } catch (error) {
            alert('❌ Error: Server connection timeout or endpoint unreachable.');
        }
    });

    // ✅ 4. PROFESSIONAL BANNER IMAGE SUBMIT + UPDATE UNIFIED ENGINE
    document.getElementById('bannerForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const bannerData = {
            subtitle: document.getElementById('bannerSubtitle').value,
            title: document.getElementById('bannerTitle').value,
            imgUrl: document.getElementById('bannerImgUrl').value
        };

        let bannerApiUrl = 'https://sultan-backend.vercel.app/api/banners/add';
        let bannerHttpMethod = 'POST';

        if (currentEditBannerId) {
            bannerApiUrl = `https://sultan-backend.vercel.app/api/banners/update/${currentEditBannerId}`;
            bannerHttpMethod = 'PUT';
        }

        try {
            const response = await fetch(bannerApiUrl, {
                method: bannerHttpMethod,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(bannerData)
            });

            const result = await response.json();
            if (result.success || response.status === 200 || response.status === 201) {
                alert(currentEditBannerId ? '🎉 Status: Banner variations updated live!' : '🎉 Status: Premium Banner uploaded online successfully!');
                
                document.getElementById('bannerForm').reset();
                currentEditBannerId = null;
                document.getElementById('bannerDynamicHeading').innerText = "Add Main Page Banner";
                document.querySelector('#bannerForm .btn-publish').innerText = "🚀 Publish Banner Live";

                fetchAdminBanners(); 
            } else {
                alert('❌ Operation Failed: ' + (result.error || 'Server processing error'));
            }
        } catch (error) {
            alert('❌ Error: Banners API endpoint unreachable or Node server offline.');
        }
    });

    // ✅ 5. SUB-ITEMS GRID WITH RIGHT-ALIGNED BUTTONS
    async function fetchAdminProducts() {
        try {
            const response = await fetch('https://sultan-backend.vercel.app/api/products/all');
            const products = await response.json();
            const listContainer = document.getElementById('admin-product-list');
            if(!listContainer) return;
            listContainer.innerHTML = '';

            if(!products || products.length === 0) {
                listContainer.innerHTML = '<p style="text-align:center; color:#666;">No products found in database.</p>';
                return;
            }

            products.forEach(p => {
                let displayImg = 'https://unsplash.com';
                if (p.images) {
                    displayImg = Array.isArray(p.images) ? p.images : p.images;
                }
                const safeTitle = p.title ? p.title.replace(/'/g, "\\'") : "";
                const safeDesc = p.description ? p.description.replace(/'/g, "\\'") : "";
                const safeSub = p.subCategory ? p.subCategory.replace(/'/g, "\\'") : "";

                const row = document.createElement('div');
                row.style = "display: flex; justify-content: space-between; align-items: center; padding: 15px 10px; border-bottom: 1px solid #eee; width: 100%; box-sizing: border-box; background: #ffffff; margin-bottom: 5px; border-radius: 4px;";
                
                row.innerHTML = `
                    <div style="display: flex; align-items: center; flex: 1; min-width: 0; padding-right: 20px;">
                        <img src="${displayImg}" style="width: 60px; height: 60px; object-fit: cover; margin-right: 15px; border-radius: 4px; flex-shrink: 0;" onerror="this.src='https://unsplash.com'">
                        <div style="min-width: 0; flex: 1;">
                            <strong style="display:block; font-size:16px; color:#222; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${p.title || p.name}</strong>
                            <span style="font-size:13px; color:#666; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">Main: ${p.category} | Sub: ${p.subCategory || 'None'} | Price: Rs. ${p.price}</span>
                        </div>
                    </div>
                    <div style="display:flex; gap:10px; flex-shrink: 0; width: 190px; justify-content: flex-end; align-items: center;">
                        <button onclick="startEditProductPipeline('${p._id}', '${safeTitle}', '${p.category}', '${safeSub}', ${p.price}, ${p.salePrice || 0}, '${displayImg}', '${safeDesc}')" style="background:#f0ad4e; color:white; border:none; padding:10px 16px; border-radius:4px; font-weight:bold; cursor:pointer; font-size:13px; text-transform:uppercase; display: flex; align-items: center; justify-content: center; gap: 4px; width: 85px; height: 38px; box-sizing: border-box;">Edit ✏️</button>
                        <button onclick="deleteProductOnline('${p._id}')" class="btn-delete" style="padding:10px 12px; font-size:13px; font-weight:bold; cursor:pointer; text-transform:uppercase; display: flex; align-items: center; justify-content: center; gap: 4px; width: 95px; height: 38px; box-sizing: border-box; margin: 0;">Delete 🗑️</button>
                    </div>
                `;
                listContainer.appendChild(row);
            });
        } catch (err) { 
            console.error("Error fetching admin products:", err); 
            const listContainer = document.getElementById('admin-product-list');
            if(listContainer) {
                listContainer.innerHTML = '<p style="text-align:center; color:red;">Database reading failure or node offline.</p>';
            }
        }
    }

    // ✅ 6. INPUT DATA FIELD AUTO-FILLER FOR PRODUCT EDIT MODES
    function startEditProductPipeline(id, title, category, subCategory, price, salePrice, imgUrl, description) {
        currentEditProductId = id; 
        
        document.getElementById('title').value = title;
        document.getElementById('category').value = category;
        
        handleCategoryChange();
        if(document.getElementById('subCategory')) {
            document.getElementById('subCategory').value = subCategory;
        }

        document.getElementById('price').value = price;
        document.getElementById('salePrice').value = salePrice;
        document.getElementById('imageUrl').value = imgUrl;
        document.getElementById('description').value = description;

        document.getElementById('formDynamicHeading').innerText = "✏️ Edit Product Variation Mode";
        document.querySelector('#productForm .btn-publish').innerText = "💾 Save Updates Online";

        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // ✅ 7. DELETE PRODUCT ACTION MANAGEMENT
    async function deleteProductOnline(id) {
        if(confirm('Kya aap waqai is suit ko website se hatana chahte hain?')) {
            try {
                const response = await fetch(`https://sultan-backend.vercel.app/api/products/delete/${id}`, { method: 'DELETE' });
                const result = await response.json();
                if(result.success || response.status === 200) {
                    alert('🗑️ Product deleted from online store!');
                    fetchAdminProducts(); 
                } else {
                    alert('❌ Delete failed on backend database.');
                }
            } catch (error) {
                alert('❌ Error: Could not delete.');
            }
        }
    }

    // ✅ 8. FETCH & DISPLAY ALL ONLINE BANNERS FOR EDIT/DELETE
    async function fetchAdminBanners() {
        try {
            const response = await fetch('https://sultan-backend.vercel.app/api/banners/all');
            const banners = await response.json();
            const bannerListContainer = document.getElementById('admin-banner-list');
            if(!bannerListContainer) return;
            bannerListContainer.innerHTML = '';

            if(!banners || banners.length === 0) {
                bannerListContainer.innerHTML = '<p style="text-align:center; color:#666;">No banners found in store collection.</p>';
                return;
            }

            banners.forEach(b => {
                const safeTitle = b.title ? b.title.replace(/'/g, "\\'") : "";
                const safeSubtitle = b.subtitle ? b.subtitle.replace(/'/g, "\\'") : "";

                const row = document.createElement('div');
                row.style = "display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #eee;";
                row.innerHTML = `
                    <div style="display: flex; align-items: center;">
                        <img src="${b.imgUrl}" style="width: 100px; height: 50px; object-fit: cover; margin-right: 15px; border-radius: 4px;" onerror="this.src='https://unsplash.com'">
                        <div>
                            <strong style="display:block; font-size:15px; color:#222;">${b.title}</strong>
                            <span style="font-size:12px; color:#666;">Subtitle: ${b.subtitle}</span>
                        </div>
                    </div>
                    <div style="display:flex; gap:10px;">
                        <button onclick="startEditBannerPipeline('${b._id}', '${safeSubtitle}', '${safeTitle}', '${b.imgUrl}')" style="background:#f0ad4e; color:white; border:none; padding:6px 12px; border-radius:4px; font-weight:bold; cursor:pointer; font-size:12px; text-transform:uppercase;">Edit ✏️</button>
                        <button onclick="deleteBannerOnline('${b._id}')" class="btn-delete" style="padding:6px 12px; font-size:12px;">Delete 🗑</button>
                    </div>
                `;
                bannerListContainer.appendChild(row);
            });
        } catch (err) {
            console.error("Error fetching banners list:", err);
        }
    }

    // ✅ 9. INPUT DATA FIELD AUTO-FILLER FOR BANNER EDIT MODES
    function startEditBannerPipeline(id, subtitle, title, imgUrl) {
        currentEditBannerId = id;
        document.getElementById('bannerSubtitle').value = subtitle;
        document.getElementById('bannerTitle').value = title;
        document.getElementById('bannerImgUrl').value = imgUrl;

        document.getElementById('bannerDynamicHeading').innerText = "✏️ Edit Banner Slider Mode";
        document.querySelector('#bannerForm .btn-publish').innerText = "💾 Save Updates Online";

        window.scrollTo({ top: document.getElementById('bannerForm').offsetTop - 20, behavior: 'smooth' });
    }

    // ✅ 10. DELETE BANNER ACTION MANAGEMENT PIPELINE
    async function deleteBannerOnline(id) {
        if(confirm('Kya aap waqai is banner slider ko home page se hatana chahte hain?')) {
            try {
                const response = await fetch(`https://sultan-backend.vercel.app/api/banners/delete/${id}`, { method: 'DELETE' });
                const result = await response.json();
                if(result.success || response.status === 200) {
                    alert('🗑️ Slider banner deleted from online database!');
                    fetchAdminBanners();
                } else {
                    alert('❌ Delete operation failed on database.');
                }
            } catch (error) {
                alert('❌ Error: Server connection loss.');
            }
        }
    }

    // ✅ 11. UNIFIED LOAD ENGINE FOR BOOTING CHANNELS CONCURRENTLY
    window.addEventListener('DOMContentLoaded', () => {
        fetchAdminProducts();
        fetchAdminBanners(); 
    });
    // 🚪 Admin System Destruction and Logout Session Clear
function logoutEngine() {
    localStorage.removeItem("sultan_session");
    window.location.href = "admin.html";
}
</script>
</body>
</html>
