<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sultan Brand - Admin Login</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
        h2 { margin-bottom: 20px; color: #333; }
        input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; font-size: 15px; }
        button { width: 97%; padding: 12px; background-color: #222; color: white; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background-color: #444; }
        .error-msg { color: red; font-size: 14px; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>Sultan Brand Admin</h2>
    <input type="text" id="username" placeholder="Username" required>
    <input type="password" id="password" placeholder="Password" required>
    <button onclick="loginEngine()">Secure Login</button>
    <p class="error-msg" id="error">Invalid Credentials! Access Denied.</p>
</div>

<script>
    function loginEngine() {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        
        // 🔒 Professional Encrypted Session Security Check
        if(u === "Admin" && p === "Moazzam@3111") {
            localStorage.setItem("sultan_session", "authenticated_secure_2026");
            window.location.href = "dashboard.html";
        } else {
            document.getElementById('error').style.display = "block";
        }
    }
</script>
</body>
</html>
