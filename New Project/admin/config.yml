backend:
  name: git-gateway
  branch: main

media_folder: "New Project/images"
public_folder: "/images"

collections:
  - name: "pages"
    label: "Pages"
    folder: "New Project"
    create: true
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Body", name: "body", widget: "markdown"}

